name: Basic - Secrets Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Display secret value
        run: |
          echo "Secret value (first 4 chars): ${{ secrets.MY_SECRET }}" | cut -c1-4
        
      - name: Use secret in environment variable
        env:
          SECRET_TOKEN: ${{ secrets.MY_SECRET }}
        run: |
          echo "Using secret from environment variable"
          echo "First few chars of secret: ${SECRET_TOKEN:0:4}"
